services:
  web:
    build: .
    env_file: .env
    ports: ["5000:5000"]
    depends_on: [postgres]
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: roomies
      POSTGRES_USER: roomies
      POSTGRES_PASSWORD: roomies_dev_password
    ports: ["5432:5432"]
    volumes:
      - roomies_pg:/var/lib/postgresql/data
volumes:
  roomies_pg:
