services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: roomies
      POSTGRES_USER: roomies
      POSTGRES_PASSWORD: roomies_password
    ports:
      - "5432:5432"
    volumes:
      - roomies_pg:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - roomies_minio:/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  roomies_pg:
  roomies_minio:
